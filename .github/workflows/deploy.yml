name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Deploy Backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: backend
          target: /tmp/deploy-stock
          strip_components: 0
          rm: true

      - name: Deploy Docker Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker
          target: /tmp/deploy-stock
          strip_components: 0
          rm: false

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: frontend/dist
          target: /tmp/deploy-stock
          strip_components: 0
          rm: false

      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo cp -r /tmp/deploy-stock/backend/* /opt/stock-backtest/backend/
            sudo cp -r /tmp/deploy-stock/docker/* /opt/stock-backtest/docker/
            sudo cp -r /tmp/deploy-stock/frontend/dist/* /opt/stock-backtest/frontend/dist/

            cd /opt/stock-backtest
            sudo docker compose up -d --build 2>&1

            # Run DB migration (wait for postgres)
            sleep 5
            sudo docker exec stock-backtest-postgres-1 psql -U postgres -d stock_backtest -f /docker-entrypoint-initdb.d/02-migration-20260514.sql 2>/dev/null || true

            sudo docker exec stock-backtest-nginx-1 nginx -s reload
            sudo docker image prune -f
          command_timeout: 30m
